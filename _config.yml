about_content: |
  #### **소리의 가치를 믿는 사운드 개발자 박상현입니다.**

  나인아크에서 5년간 사내 모든 프로젝트의 SFX 및 Voice 총괄 역할을 맡아, 초기 설계부터 라이브 서비스 운영까지 사운드 개발 프로세스를 주도했습니다. 프로토타입부터 소프트 런칭, 라이브 안정화까지 프로젝트들의 시작과 성장을 함께하며 탄탄한 사운드 환경을 구축하는 데 집중해 왔습니다.

  소리를 다루는 과정을 항상 즐겁고 감사하게 생각합니다. 전문성을 확장해 나가면서도, 소리 본질의 가치를 잊지 않는 사운드 개발자가 되고자 합니다.

  ---

  **Core Philosophy**
  - **박상현은 사운드 ‘개발자’ 입니다.** 단순히 소리를 만드는 것을 넘어, 기술적 이해를 바탕으로 프로젝트 구성원들과 함께 사운드 시스템을 최적의 형태로 구현해내는 가교 역할을 지향합니다.
  - **박상현은 문제를 회피하지 않습니다.** 오디오 전반의 업무를 수행하며 마주한 수많은 기술적 문제를 회피하지 않고 해결해 왔습니다. 그 과정에서 얻은 인사이트를 데이터화하여 새로운 프로젝트의 안정성을 높이는 자산으로 사용합니다.
  - **박상현은 자기 주도적 인간입니다.** 스스로 높은 기준을 설정하여 움직이며, 명확한 타임라인 설정과 프로세스 최적화를 통해 어떠한 환경에서도 일정 차질 없는 개발 환경을 조성합니다.

  ---

  **Personal Information**
  - **Birth:** 1990. 05. 08
  - **Address:** 경기도 용인시 수지구 수지로 323
  - **Military Service:** 육군 병장 만기전역 (2010.02 - 2011.12)

